<!DOCTYPE html>
<html>

<head>
    <title>Upload Multiple GPX Files</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet" />
     <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg,rgb(255, 255, 255) 0%,rgb(226, 226, 226) 30%, rgb(212, 212, 212) 63%, rgb(198, 198, 198) 100%);
            color: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        header {
            background-color: rgba(67, 115, 131, 0.9);
            color: #fff;
            width: 100%;
            text-align: center;
            padding: 1.25rem 0;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 600;
        }

        main {
            flex: 1;
            width: 100%;
            padding: 6rem 1rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .upload-container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            max-width: 700px;
            width: 50%;
            backgroundcolor: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            text-align: center;
            transition: transform 0.3s ease-in-out;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
        }

        .file-input-container {
            width: 100%;
        }

        input[type="file"] {
            display: none;
        }

        .file-upload-label {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: #ffffff;
            color: #000;
            border: 1px solid #437383;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: 0.3s ease;
        }

        .file-upload-label:hover {
            background-color: rgb(233, 253, 219);
            border-color: #00332e;
        }

        .file-list {
            margin-top: 0.75rem;
            color: #444;
            font-size: 0.9rem;
            text-align: left;
            max-height: 100px;
            overflow-y: auto;
        }

        button[type="submit"] {
            background-color: #437383;
            color: #fff;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button[type="submit"]:hover {
            background-color: #72A2B3;
            color: #000;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <header>
    <h1>Upload Multiple GPX Files</h1>
    </header>
    <div class="upload-container">
       <form method="post" enctype="multipart/form-data">
            <p>Select multiple GPX files to upload and view their contents.</p>
            {% csrf_token %}
            <div class="file-input-container">
                <label class="file-upload-label" for="gpx-files">Choose GPX Files</label>
                <input type="file" id="gpx-files" name="gpx_files" multiple accept=".gpx">
                <div class="file-list"></div>
            </div>
            <button type="submit">Upload & View</button>
        </form>
    </div>

    <script>
        document.getElementById('gpx-files').addEventListener('change', function (e) {
            var fileList = document.querySelector('.file-list');
            fileList.innerHTML = '';
            if (e.target.files.length > 0) {
                Array.from(e.target.files).forEach(file => {
                    let listItem = document.createElement('div');
                    listItem.textContent = file.name;
                    fileList.appendChild(listItem);
                });
            } else {
                fileList.textContent = 'No files selected';
            }
        });
    </script>
</body>

</html>
