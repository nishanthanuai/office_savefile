<!DOCTYPE html>
<html lang="en" id="htmlRoot">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display JSON Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet" />

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-base: clamp(0.9rem, 1.4vw, 1.05rem);
            --font-header: clamp(1.4rem, 2.5vw, 2rem);
            --btn-padding: 0.6rem 1rem;
            --btn-radius: 10px;
            --btn-gap: 10px;

            /* Layout */
            --bg-body: #F8FAFC;
            --bg-body-gradient: linear-gradient(180deg, #fff 0%, #e2e2e2 30%, #d4d4d4 63%, #c6c6c6 100%);
            --header-bg: rgba(67, 115, 131, 0.9);
            --header-text: #fff;
            --container-bg: rgba(255, 255, 255, 0.8);
            --container-shadow: rgba(0, 0, 0, 0.4);
            --info-bg: rgba(0, 0, 0, 0.05);

            /* Typography */
            --text-primary: #0F172A;
            --text-muted: #475569;
            --label-color: #437383;
            --value-color: #555;

            /* Buttons */
            --primary-btn: linear-gradient(180deg, #9ab2ba 0%, #6b909c 100%);
            --accent: #ffbb52;
            --danger: #ff5252;
            --btn-menu-bg: white;
            --btn-menu-text: #333;
            --btn-menu-hover-bg: black;
            --btn-menu-hover-text: white;

            /* Inputs */
            --input-bg: #fff;
            --input-border: #ccc;
            --input-focus-border: #007BFF;

            /* Checkboxes */
            --checkbox-bg: #f9fafb;
            --checkbox-border: #d1d5db;
            --checkbox-strong: #111827;
            --checkbox-accent: #2563eb;

            /* Select */
            --select-bg: #fff;
            --select-border: #ccc;

            /* Table */
            --table-border: transparent;
        }

        [data-theme="dark"] {
            /* Layout */
            --bg-body: #121212;
            --bg-body-gradient: linear-gradient(180deg, #1a1a1a 0%, #141414 30%, #111111 63%, #0d0d0d 100%);
            --header-bg: rgba(30, 30, 30, 0.95);
            --header-text: #e0e0e0;
            --container-bg: rgba(28, 28, 28, 0.9);
            --container-shadow: rgba(0, 0, 0, 0.6);
            --info-bg: rgba(255, 255, 255, 0.04);

            /* Typography */
            --text-primary: #e6e6e6;
            --text-muted: #9a9a9a;
            --label-color: #b0b0b0;
            --value-color: #c0c0c0;

            /* Buttons */
            --primary-btn: linear-gradient(180deg, #3a3a3a 0%, #2a2a2a 100%);
            --accent: #d4993a;
            --danger: #c0392b;
            --btn-menu-bg: #1c1c1c;
            --btn-menu-text: #ccc;
            --btn-menu-hover-bg: #333;
            --btn-menu-hover-text: #fff;

            /* Inputs */
            --input-bg: #1c1c1c;
            --input-border: #333;
            --input-focus-border: #888;

            /* Checkboxes */
            --checkbox-bg: #1c1c1c;
            --checkbox-border: #333;
            --checkbox-strong: #e0e0e0;
            --checkbox-accent: #888;

            /* Select */
            --select-bg: #1c1c1c;
            --select-border: #333;

            /* Table */
            --table-border: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body-gradient);
            color: var(--text-primary);
            font-size: clamp(0.9rem, 1.4vw, 1.05rem);
            transition: background 0.3s ease, color 0.3s ease;
        }

        header {
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;
            transition: background 0.3s ease;
        }

        header h1 {
            color: var(--header-text);
            font-weight: 600;
            font-size: 2rem;
        }

        main {
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        #image-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            width: 95vw;
            height: 95vh;
            background: var(--container-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--btn-radius);
            box-shadow: 0 6px 20px var(--container-shadow);
            padding: 10px;
            gap: 10px;
            overflow: auto;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        #image-element {
            max-width: 75%;
            height: 100%;
            border-radius: var(--btn-radius);
            object-fit: contain;
            transition: opacity 0.5s ease-in-out;
        }

        #image-info {
            width: 25%;
            height: 90%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: var(--info-bg);
            border-radius: var(--btn-radius);
            padding: 10px;
            transition: background 0.3s ease;
        }

        #anomaly-type-checkboxes {
            border: 1px solid var(--checkbox-border);
            border-radius: 0.5rem;
            padding: 1rem;
            background-color: var(--checkbox-bg);
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            font-family: sans-serif;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        #anomaly-type-checkboxes strong {
            flex-basis: 100%;
            font-size: 1rem;
            color: var(--checkbox-strong);
        }

        #anomaly-type-checkboxes label {
            display: flex;
            align-items: center;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        #anomaly-type-checkboxes input[type="checkbox"] {
            margin-right: 0.3rem;
            accent-color: var(--checkbox-accent);
            width: 16px;
            height: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 6px 0;
            border-bottom: 1px solid var(--table-border);
        }

        .label {
            font-weight: 600;
            color: var(--label-color);
        }

        .value {
            color: var(--value-color);
        }

        .jump {
            margin-top: 10px;
        }

        .jump input {
            width: 68%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-primary);
            margin-right: 10px;
            font-size: var(--font-base);
            transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        .jump input:focus {
            outline: none;
            border-color: var(--input-focus-border);
        }

        .jump button {
            width: 30%;
            background: var(--primary-btn);
            color: white;
            padding: 10px;
            border-radius: var(--btn-radius);
            border: none;
            cursor: pointer;
        }

        .jump-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        #button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
            width: 100%;
        }

        .button-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        #prev-button,
        #next-button {
            background-color: var(--accent);
            flex: 1;
        }

        #delete-undo-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        #delete-button {
            background-color: var(--danger);
            flex: 7;
        }

        #undo-button {
            background: var(--primary-btn);
            flex: 3;
        }

        #download-button,
        #patch-button {
            background: var(--primary-btn);
            width: 100%;
        }

        button {
            font-size: 1rem;
            padding: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: 0.2s ease-in-out;
            white-space: nowrap;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            color: #fff;
        }

        #anomaly-type-select {
            width: 100%;
            padding: 6px;
            border-radius: 6px;
            background-color: var(--select-bg);
            color: var(--text-primary);
            border: 1px solid var(--select-border);
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        @media (max-width: 1024px) {
            #image-container {
                flex-direction: column;
                height: auto;
            }

            #image-element {
                width: 100%;
                max-height: 300px;
            }

            #image-info {
                width: 100%;
                height: auto;
            }

            .jump-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .jump input,
            .jump button {
                width: 100%;
                margin: 5px 0;
            }

            .button-group {
                flex-direction: column;
            }
        }

        .btn {
            position: absolute;
            left: 1%;
            background-color: var(--btn-menu-bg);
            color: var(--btn-menu-text);
            padding: 0.7rem 1.4rem;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s ease;
            justify-self: flex-start;
        }

        .btn:hover {
            background-color: var(--btn-menu-hover-bg);
            color: var(--btn-menu-hover-text);
            transform: scale(1.05);
        }

        /* Theme Toggle Button */
        #theme-toggle {
            position: absolute;
            right: 1%;
            background-color: var(--btn-menu-bg);
            color: var(--btn-menu-text);
            padding: 0.7rem 1.4rem;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s ease;
            border: none;
            cursor: pointer;
        }

        #theme-toggle:hover {
            background-color: var(--btn-menu-hover-bg);
            color: var(--btn-menu-hover-text);
            transform: scale(1.05);
        }
    </style>


</head>

<body>
    <header>
        <a href="/" class="btn">← Menu</a>
        <h1>Pavement Model Testing</h1>
        <button id="theme-toggle"><span id="theme-icon">🌙</span> Dark Mode</button>
    </header>

    <main>
        <div id="image-container">
            <img id="image-element" src="" alt="Image" />
            <div id="image-info">
                <div id="anomaly-type-checkboxes">
                    <strong>Filter by Anomaly Type:</strong><br>
                    <!-- Checkboxes will be inserted here dynamically -->
                </div>

                <div id="image-details">
                    <table>
                        <tr>
                            <td><span class="label">Anomaly Number:</span></td>
                            <td> <span class="value" id="anomaly-number"></span></td>

                        <tr>
                            <td><span class="label">Anomaly Type:</span></td>

                        </tr>
                        <tr>
                            <td><span class="label">Latitude:</span></td>
                            <td> <span class="value" id="latitude"></span></td>
                        </tr>
                        <tr>
                            <td><span class="label">Longitude:</span></td>
                            <td> <span class="value" id="longitude"></span></td>
                        </tr>
                        <tr>
                            <td><span class="label">Distance:</span></td>
                            <td> <span class="value" id="distance"></span></td>
                        </tr>
                        <tr>
                            <td><span class="label">Change Type:</span></td>
                            <td>
                                <select id="anomaly-type-select">
                                    <option value="Pothole">Pothole</option>

                                    <option value="Delamination">Delamination</option>
                                    <option value="Minor Pothole">Minor Pothole</option>
                                    <option value="Medium Pothole">Medium Pothole</option>
                                    <option value="Major Pothole">Major Pothole</option>

                                    {% comment %} <option value="Alligator Crack">Alligator Crack</option>
                                    <option value="Crack/L-H">Crack/L-H</option> {% endcomment %}
                                    <!-- Add more if needed -->
                                </select>
                            </td>
                        </tr>


                    </table>
                    <div class="jump">
                        <label for="jump-input">Jump to Anomaly Number:</label>
                        <div style="display: flex; align-items: center; flex-direction: row; margin-top: 10px;">
                            <input type="number" id="jump-input" placeholder="Enter anomaly number" />
                            <button id="jump-button" class="action-button">Jump</button>
                        </div>
                    </div>
                    {% comment %} {% comment %} <div><span class="label">Anomaly Number:</span> <span class="value"
                            id="anomaly-number"></span></div> {% endcomment %}

                    {% comment %} <div><span class="label">Anomaly Number:</span> <span class="value"
                            id="anomaly-number"></span></div>
                    <div><span class="label">Anomaly Type:</span> <span class="value" id="anomaly-type"></span></div>
                    <div><span class="label">Latitude:</span> <span class="value" id="latitude"></span></div>
                    <div><span class="label">Longitude:</span> <span class="value" id="longitude"></span></div>
                    <div><span class="label">Distance:</span> <span class="value" id="distance"></span></div>

                    <div class="button-group">
                        <button id="prev-button">Previous</button>

                        <button id="delete-button">Delete</button>
                        <button id="undo-button">Undo</button>
                    </div>

                    <button id="download-button">Download JSON</button>
                    <button id="patch-button">Patch Latest JSON</button>

                </div>


            </div>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const originalFilename = '{{ original_filename|escapejs }}';
            const dataStr = '{{ data|escapejs }}';

            let data = { Anomalies: [] };
            try {
                data = JSON.parse(dataStr);
            } catch (e) {
                console.error('Error parsing JSON data:', e);
            }

            let imageAssets = data.Anomalies || [];
            let deletedItems = [];
            let currentIndex = 0;

            const checkboxContainer = document.getElementById('anomaly-type-checkboxes');
            const dropdownContainer = document.getElementById('anomaly-type-select').closest('tr');

            // ✅ Create checkboxes dynamically from anomaly types in JSON
            const anomalyTypes = [...new Set(imageAssets.map(item => item['Anomaly type']))];
            anomalyTypes.forEach(type => {
                const label = document.createElement('label');
                label.style.display = 'block';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = type;
                checkbox.checked = true;

                checkbox.addEventListener('change', () => {
                    currentIndex = 0;
                    updateContent();
                });

                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(' ' + type));
                checkboxContainer.appendChild(label);
            });

            function getSelectedAnomalyTypes() {
                const checkboxes = checkboxContainer.querySelectorAll('input[type="checkbox"]');
                return Array.from(checkboxes)
                    .filter(cb => cb.checked)
                    .map(cb => cb.value);
            }

            function getFilteredAssets() {
                const selectedTypes = getSelectedAnomalyTypes();
                if (selectedTypes.length === 0) return [];
                return imageAssets.filter(item => selectedTypes.includes(item['Anomaly type']));
            }

            function updateContent() {
                const filteredAssets = getFilteredAssets();
                if (filteredAssets.length === 0) {
                    document.getElementById('image-element').src = '';
                    document.getElementById('anomaly-number').textContent = 'N/A';
                    document.getElementById('anomaly-type').textContent = 'N/A';
                    document.getElementById('latitude').textContent = 'N/A';
                    document.getElementById('longitude').textContent = 'N/A';
                    document.getElementById('distance').textContent = 'N/A';
                    dropdownContainer.style.display = 'none';
                    return;
                }

                currentIndex = Math.min(currentIndex, filteredAssets.length - 1);
                const asset = filteredAssets[currentIndex];

                document.getElementById('image-element').src = asset.image || '';
                document.getElementById('anomaly-number').textContent = asset['Anomaly number'] || 'N/A';
                document.getElementById('anomaly-type').textContent = asset['Anomaly type'] || 'N/A';
                document.getElementById('latitude').textContent = asset['Latitude'] || 'N/A';
                document.getElementById('longitude').textContent = asset['Longitude'] || 'N/A';
                document.getElementById('distance').textContent = asset['Distance from start point in meters'] || 'N/A';
                document.getElementById('anomaly-type-select').value = asset['Anomaly type'];

                const editableTypes = ['Pothole', 'Delamination', 'Minor Pothole', 'Medium Pothole', 'Major Pothole', 'POTHOLE'];
                if (editableTypes.includes(asset['Anomaly type'])) {
                    dropdownContainer.style.display = '';
                } else {
                    dropdownContainer.style.display = 'none';
                }
            }

            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }

            document.getElementById('anomaly-type-select').addEventListener('change', function () {
                const newType = this.value;
                const filteredAssets = getFilteredAssets();
                const currentAsset = filteredAssets[currentIndex];
                const fullIndex = imageAssets.findIndex(item => item === currentAsset);

                if (fullIndex !== -1) {
                    imageAssets[fullIndex]['Anomaly type'] = newType;

                    let checkbox = checkboxContainer.querySelector(`input[value="${newType}"]`);
                    if (!checkbox) {
                        const label = document.createElement('label');
                        checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.value = newType;
                        checkbox.checked = true;
                        checkbox.addEventListener('change', () => {
                            currentIndex = 0;
                            updateContent();
                        });
                        label.appendChild(checkbox);
                        label.appendChild(document.createTextNode(' ' + newType));
                        checkboxContainer.appendChild(label);
                    } else if (!checkbox.checked) {
                        checkbox.checked = true;
                    }

                    updateContent();
                }
            });

            document.getElementById('next-button').addEventListener('click', () => {
                const filteredAssets = getFilteredAssets();
                if (filteredAssets.length === 0) return;
                currentIndex = (currentIndex + 1) % filteredAssets.length;
                updateContent();
            });

            document.getElementById('prev-button').addEventListener('click', () => {
                const filteredAssets = getFilteredAssets();
                if (filteredAssets.length === 0) return;
                currentIndex = (currentIndex - 1 + filteredAssets.length) % filteredAssets.length;
                updateContent();
            });

            document.getElementById('delete-button').addEventListener('click', () => {
                const filteredAssets = getFilteredAssets();
                if (filteredAssets.length === 0) return;

                const deletedItem = filteredAssets[currentIndex];
                const fullIndex = imageAssets.findIndex(item => item === deletedItem);
                deletedItems.push({ item: deletedItem, index: fullIndex });
                imageAssets.splice(fullIndex, 1);

                const newFilteredAssets = getFilteredAssets();
                currentIndex = Math.min(currentIndex, newFilteredAssets.length - 1);
                updateContent();
            });

            document.getElementById('undo-button').addEventListener('click', () => {
                if (deletedItems.length > 0) {
                    const restored = deletedItems.pop();
                    imageAssets.splice(restored.index, 0, restored.item);
                    currentIndex = restored.index;
                    updateContent();
                }
            });

            document.getElementById('download-button').addEventListener('click', () => {
                const updatedData = JSON.stringify(data, null, 2);
                const blob = new Blob([updatedData], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const updatedFilename = originalFilename.replace(/(.json)$/i, '_updated$1');
                a.href = url;
                a.download = updatedFilename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            document.getElementById('jump-button').addEventListener('click', () => {
                const input = document.getElementById('jump-input').value.trim();
                const targetNumber = parseInt(input);
                const filteredAssets = getFilteredAssets();

                if (isNaN(targetNumber) || filteredAssets.length === 0) {
                    alert("Invalid input or no data.");
                    return;
                }

                let index = filteredAssets.findIndex(item => parseInt(item["Anomaly number"]) === targetNumber);
                if (index !== -1) {
                    currentIndex = index;
                    updateContent();
                    return;
                }

                let closest = 0, minDiff = Math.abs(parseInt(filteredAssets[0]["Anomaly number"]) - targetNumber);
                for (let i = 1; i < filteredAssets.length; i++) {
                    const diff = Math.abs(parseInt(filteredAssets[i]["Anomaly number"]) - targetNumber);
                    if (diff < minDiff) {
                        closest = i;
                        minDiff = diff;
                    }
                }

                alert("Exact match not found. Jumping to closest anomaly number: " + filteredAssets[closest]["Anomaly number"]);
                currentIndex = closest;
                updateContent();
            });

            document.getElementById('patch-button').addEventListener('click', () => {
                if (!confirm("Are you sure you want to update the database with current changes?")) return;

                // Use 'imageAssets' which you defined at the top of your script
                const finalData = {
                    Anomalies: imageAssets
                };

                // Using the named URL from urls.py
                fetch("{% url 'patch_pavement_json' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({
                        filename: originalFilename,
                        data: finalData
                    })
                })
                    .then(response => {
                        if (response.ok) {
                            alert('Data patched successfully!');
                        } else {
                            // Try to get error message from server
                            return response.json().then(data => {
                                alert('Failed: ' + (data.error || 'Unknown error'));
                            });
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('An error occurred.');
                    });
            });

            updateContent();
        });
    </script>

    <script>
        // --- Dark Mode Toggle ---
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.getElementById('htmlRoot');

        function applyTheme(theme) {
            htmlElement.setAttribute('data-theme', theme);
            if (theme === 'dark') {
                themeIcon.textContent = '☀️';
                themeToggle.innerHTML = '<span id="theme-icon">☀️</span> Light Mode';
            } else {
                themeIcon.textContent = '🌙';
                themeToggle.innerHTML = '<span id="theme-icon">🌙</span> Dark Mode';
            }
        }

        // Initialize from saved preference
        const savedTheme = localStorage.getItem('theme') || 'light';
        applyTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>

    <script>
        document.addEventListener('keydown', function (event) {
            const key = event.key.toLowerCase();
            if (key === 'a') {
                document.getElementById('prev-button')?.click();
            } else if (key === 'd') {
                document.getElementById('next-button')?.click();
            // } else if (key === 'e') {
            //     document.getElementById('delete-button')?.click();
            } else if (key === 'r') {
                document.getElementById('undo-button')?.click();
            }
        });
    </script>
