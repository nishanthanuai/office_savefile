{%load static%}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markers Map</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg,rgb(255, 255, 255) 0%,rgb(226, 226, 226) 30%, rgb(212, 212, 212) 63%, rgb(198, 198, 198) 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #map {
            height: 80vh;
            width: 100%;
        }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCzmow8f_ZC9tyhaULB5xec8sG4HEchADk"></script>
    <script>
        function initMap() {
            const markers = {{ markers|safe }};
            console.log(markers);
            let center = { lat: 0, lng: 0 };

            if (markers.length > 0) {
                center = { lat: markers[0].lat, lng: markers[0].lng };
            }

            const map = new google.maps.Map(document.getElementById('map'), {
                zoom: 10,
                center: center
            });
            if (markers.length > 0) {
                const bounds = new google.maps.LatLngBounds();
                markers.forEach(markerData => {
                    const position = new google.maps.LatLng(markerData.lat, markerData.lng);
                    new google.maps.Marker({
                        position: position,
                        map: map
                    });
                    bounds.extend(position);
                });
                map.fitBounds(bounds);
            }
        }
    </script>
</head>
<body onload="initMap()">
    <div id="map"></div>
</body>
</html>
