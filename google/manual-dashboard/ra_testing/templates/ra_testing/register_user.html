<!DOCTYPE html>
<html>
<head>
    <title>Register New User</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: #F1F1F1;
            background: linear-gradient(180deg,rgb(255, 255, 255) 0%,rgb(226, 226, 226) 30%, rgb(212, 212, 212) 63%, rgb(198, 198, 198) 100%);
            height: 100vh;
        }

        header {
            background: rgba(67, 115, 131, 0.9);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            margin: 0;
            color: #fff;
            font-size: 1.8rem;
        }

        .left-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .adm_dash_btn {
            background-color: #1976d2;
            color: white;
            text-decoration: none;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        .adm_dash_btn:hover {
            background-color: #1565c0;
        }

        .login-container {
            max-width: 420px;
            margin: 3rem auto;
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #437383;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            color: #333;
        }

        label {
            font-size: 0.95rem;
            color: #333;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        select {
            padding: 0.5rem;
            border: 1px solid #ccc;
            font-size: 1rem;
            width: 100%;
            font-size: 1rem;
            border-radius: 8px;
            background-color: rgba(200, 200, 200, 0.5);
            color: #000;
            cursor: pointer;
        }

        button {
            padding: 0.6rem;
            background-color: #437383;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #365f6b;
            color: #fff;
        }
        select {
            padding: 0.5rem;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: rgba(200, 200, 200, 0.5);
            color: #000;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>RA Testing Admin Dashboard</h1>
        <div class="left-section">
            {% comment %} <a href="{% url 'admin_dashboard' %}" class="adm_dash_btn">Admin Dashboard</a> {% endcomment %}
            <a href="{% url 'user_list' %}" class="adm_dash_btn">Registered Users</a>  
        </div>    
    </header>
<main>
    <div class="login-container">
        <h2>Register a New User</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>
    </div>
</main>
</body>
</html>
