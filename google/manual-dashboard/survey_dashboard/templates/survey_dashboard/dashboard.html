<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(180deg,rgba(242, 242, 242, 1) 0%, rgba(230, 230, 230, 1) 100%);
            color: #fff;
        }

        header {
            background: rgba(67, 115, 131, 0.9);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .left-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .left-section span {
            font-weight: 300;
            font-size: 1rem;
            color: rgba(243, 210, 109, 1);
        }

        .log_btn {
            background-color: #f44336;
            color: #fff;
            border: none;
            padding: 0.5rem 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .log_btn:hover {
            background-color: #f1f1f1;
            transform: scale(1.05);
        }

        main {
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        .container {
            background-color: rgba(200, 200, 200, 0.5);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 30px rgba(160, 160, 160, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
        }

        .container h2 {
            font-size: 1.8rem;
            color : #000;
            margin-bottom: 1rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.7);
            padding-bottom: 0.5rem;
        }

        .container p {
            font-size: 1rem;
            color: #000;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            background-color: #437383;
            color: #fff;
            padding: 0.7rem 1.4rem;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: #72A2B3;
            color: #000;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            main {
                padding: 2rem 1rem;
            }

            .container-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
    </head>
    <body>
        <header>
            <h1>RA Survey Tracker Dashboard</h1>
            <div class="left-section">
                <span>Welcome, {{ user.email }}</span>
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="log_btn">Logout</button>
                </form>
            </div>
        </header>
        <main>
            <div class="container-group">

                <div class="container">
                    <h2>Before Survey</h2>
                    <p>Survey Dashboard</p>
                    <a href="{% url 'survey_dashboard:before_survey' %}" class="btn">Detail</a>
                </div>
                <div class="container">
                    <h2>During Survey</h2>
                    <p>Survey Dashboard</p>
                    <a href="{% url 'survey_dashboard:during_survey' %}" class="btn">Detail</a>
                </div>
                <div class="container">
                    <h2>Assign Trip for Surveyor</h2>
                    <p>Survey Dashboard</p>
                    <a href="{% url 'survey_dashboard:assign_trip' %}" class="btn">Detail</a>
                </div>
            </div    
        </main>
    </body>

</html>
