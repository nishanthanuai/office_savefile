<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-datatables@9.0.3"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg,rgba(242, 242, 242, 1) 0%, rgba(230, 230, 230, 1) 100%);
            color: #fff;
        }

        header {
            background: rgba(67, 115, 131, 0.9);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .left-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .left-section span {
            font-weight: 300;
            font-size: 1rem;
            color: rgba(243, 210, 109, 1);
        }

        .log_btn {
            background-color: #f44336;
            color: #fff;
            border: none;
            padding: 0.5rem 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .log_btn:hover {
            background-color: #f1f1f1;
            transform: scale(1.05);
        }

        

        .btn {
            display: inline-block;
            background-color: #004d40;
            color: #fff;
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            border-radius: 12px;
            margin-top: 1rem;
            font-size: 1.125rem;
            transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            background-color: #00332e;
            transform: scale(1.05);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.3);
        }

        /* DataTables Enhancements */
        .datatable-search {
            padding: 0.5rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
            width: 100%;
            color: #4b5563;
            font-size: 0.875rem;
            max-width: 300px;
            transition: border-color 0.2s, box-shadow 0.2s;
            
        }

        .datatable-search:focus {
            padding: 0.5rem 1rem;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .datatable-dropdown {
            position: relative;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .datatable-dropdown label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #4b5563;
            font-size: 0.875rem;
        }

        .datatable-dropdown select {
            padding: 0.5rem 2rem 0.5rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            background-color: white;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            appearance: none;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .datatable-dropdown select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .datatable-info {
            color: #6b7280;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        
        .datatable-top {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        @media (min-width: 768px) {
            .datatable-top {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }

            .datatable-dropdown {
                margin-bottom: 0;
            }

            .datatable-info {
                margin-bottom: 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>RA Survey Tracker Dashboard</h1>
        <div class="left-section">
            <span>Welcome, {{ user.email }}</span>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="log_btn">Logout</button>
            </form>
        </div>
    </header>

    <main class="container mx-auto p-6 bg-white w-full rounded-lg shadow-md mt-4">
        <div class="mt-12 w-full px-4">
            <h2 class="text-2xl font-semibold text-center mb-2 text-gray-600 py-6">Trips List</h2>
            
            <div class="overflow-x-auto bg-white">
                <table class="min-w-full divide-y divide-gray-200 text-sm text-left" id="tripTable">
                    <thead class="bg-gray-200">
                        <tr>
                            <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider bg-gray-300 text-gray-700">Trip ID</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider bg-gray-300 text-gray-700">Surveyor</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider bg-gray-300 text-gray-700">Driver</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider bg-gray-300 text-gray-700">Location</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider bg-gray-300 text-gray-700">Date</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider bg-gray-300 text-gray-700">Vehicle</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-100">
                        {% for trip in assign %}
                        <tr class="hover:bg-gray-50 transition-colors duration-150">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ trip.trip_id }}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ trip.surveyor_name }}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ trip.driver_name }}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ trip.location }}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ trip.date }}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ trip.vehicle_number }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        
    </main>

    <script>
        // DataTable init for Trip Table
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof simpleDatatables.DataTable !== 'undefined') {
                new simpleDatatables.DataTable("#tripTable", {
                    paging: true,
                    perPage: 10,
                    perPageSelect: [10, 20, 30],
                    classes: {
                        input: "datatable-input",
                        search: "datatable-search",
                        dropdown: "datatable-dropdown",
                        info: "datatable-info"
                    },
                    labels: {
                        placeholder: "Search...",
                        searchTitle: "Search table",
                        perPage: "entries per page",
                        noRows: "No data",
                        info: "Showing {start} to {end} of {rows} entries"
                    }
                });
            }
        });
    </script>
    
    <script>
        
        // Function to initialize DataTable with common configuration
        function initDataTable(tableId) {
            if (document.getElementById(tableId) && typeof simpleDatatables.DataTable !== 'undefined') {
                return new simpleDatatables.DataTable(`#${tableId}`, {
                    paging: true,
                    perPage: 10,
                    perPageSelect: [10, 20, 30],
                    sortable: false,
                    classes: {
                        wrapper: "p-4",
                        active: "bg-gray-500 text-white",
                        disabled: "opacity-50 cursor-not-allowed",
                        paginationList: "flex justify-center space-x-2",
                        paginationListItem: "bg-gray-200 px-3 py-1 rounded",
                        paginationListItemLink: "text-gray-700",
                        input: "datatable-input",
                        search: "datatable-search",
                        dropdown: "datatable-dropdown",
                        selector: "datatable-selector",
                        info: "datatable-info"
                    },
                    labels: {
                        placeholder: "Search...",
                        searchTitle: "Search within table",
                        perPage: "entries per page",
                        noRows: "No entries found",
                        info: "Showing {start} to {end} of {rows} entries"
                    }
                });
            }
            return null;
        }
    
        // Initialize both tables
        const beforeSurveyTable = initDataTable("before-survey-table");
        const duringSurveyTable = initDataTable("during-survey-table");
    </script>
    <script src="https://cdn.jsdelivr.net/npm/simple-datatables@latest"></script>   

</body>
</html>
