<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Survey Dashboard</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/simple-datatables@9.0.3"></script>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: 'Poppins', sans-serif;
                min-height: 100vh;
                background: linear-gradient(180deg,rgba(242, 242, 242, 1) 0%, rgba(230, 230, 230, 1) 100%);
                color: #fff;
            }
    
            header {
                background: rgba(67, 115, 131, 0.9);
                backdrop-filter: blur(12px);
                padding: 1rem 2rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
    
            header h1 {
                font-size: 2rem;
                font-weight: 600;
            }
    
            .left-section {
                display: flex;
                align-items: center;
                gap: 1rem;
            }
    
            .left-section span {
                font-weight: 300;
                font-size: 1rem;
                color: rgba(243, 210, 109, 1);
            }
    
            .log_btn {
                background-color: #f44336;
                color: #fff;
                border: none;
                padding: 0.5rem 1.1rem;
                border-radius: 8px;
                cursor: pointer;
                font-size: 1rem;
                font-weight: 600;
                transition: 0.3s ease;
            }
    
            .log_btn:hover {
                background-color: #f1f1f1;
                color: #000;
                transform: scale(1.05);
            }

    
            /* DataTables Enhancements */
            .datatable-search {
                padding: 0.5rem 1rem;
                border: 1px solid #d1d5db;
                border-radius: 0.375rem;
                margin-bottom: 1rem;
                width: 100%;
                color: #4b5563;
                font-size: 0.875rem;
                max-width: 300px;
                transition: border-color 0.2s, box-shadow 0.2s;
                
            }
    
            .datatable-search:focus {
                padding: 0.5rem 1rem;
                border-color: #3b82f6;
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            }
    
            .datatable-dropdown {
                position: relative;
                display: inline-block;
                margin-bottom: 1rem;
            }
    
            .datatable-dropdown label {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                color: #4b5563;
                font-size: 0.875rem;
            }
    
            .datatable-dropdown select {
                padding: 0.5rem 2rem 0.5rem 1rem;
                border: 1px solid #d1d5db;
                border-radius: 0.375rem;
                background-color: white;
                background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
                background-position: right 0.5rem center;
                background-repeat: no-repeat;
                background-size: 1.5em 1.5em;
                appearance: none;
                box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            }
    
            .datatable-dropdown select:focus {
                border-color: #3b82f6;
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            }
    
            .datatable-info {
                color: #6b7280;
                font-size: 0.875rem;
                margin-bottom: 1rem;
            }
            
            .datatable-top {
                display: flex;
                flex-direction: column;
                gap: 1rem;
                margin-bottom: 1rem;
            }
    
            @media (min-width: 768px) {
                .datatable-top {
                    flex-direction: row;
                    justify-content: space-between;
                    align-items: center;
                }
    
                .datatable-dropdown {
                    margin-bottom: 0;
                }
    
                .datatable-info {
                    margin-bottom: 0;
                }
            }
        </style>
    </head>
<body data-csrf="{{ csrf_token }}">
    <header>
        <h1>RA Survey Tracker Dashboard</h1>
        <div class="left-section">
            <span>{{ user.email }}</span>
            {% comment %} <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="log_btn">Logout</button>
            </form> {% endcomment %}
        </div>
    </header>

    <main class="container mx-auto p-6 bg-white w-full rounded-lg shadow-md mt-4">    
            <h1 class="text-2xl font-bold mb-4 text-center text-gray-700">Assign Trip for Surveyor</h1>

            <div class="max-w-5xl mx-auto bg-white p-8 ">
                <form id="tripForm" class="space-y-5">
                    {% csrf_token %}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="trip_id" class="block text-sm font-medium text-gray-700 mb-1">Trip ID</label>
                            <input type="text" id="trip_id" placeholder="Enter Trip ID"
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all">
                        </div>
                        <div>
                            <label for="surveyor_name" class="block text-sm font-medium text-gray-700 mb-1">Surveyor Name</label>
                            <input type="text" id="surveyor_name" placeholder="Enter Surveyor Name"
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all">
                        </div>
                        <div>
                            <label for="driver_name" class="block text-sm font-medium text-gray-700 mb-1">Driver Name</label>
                            <input type="text" id="driver_name" placeholder="Enter Driver Name"
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all">
                        </div>
                        <div>
                            <label for="location" class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                            <input type="text" id="location" placeholder="Enter Location"
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all">
                        </div>
                        <div>
                            <label for="date" class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                            <input type="date" id="date"
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all">
                        </div>
                        <div>
                            <label for="vehicle_number" class="block text-sm font-medium text-gray-700 mb-1">Vehicle Number</label>
                            <input type="text" id="vehicle_number" placeholder="Enter Vehicle Number"
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all">
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full md:w-auto px-6 py-3 bg-gradient-to-r from-orange-500 to-orange-600 text-white font-medium rounded-lg shadow-md hover:from-orange-600 hover:to-orange-700 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:ring-offset-2 transition-all transform hover:-translate-y-0.5">
                        Submit
                    </button>
                </form>
            </div>
            <div class="mt-4 text-center text-gray-600 border-t pt-4">
                click here to see the list of assigned trips
                <br>
                <a href="{% url 'survey_dashboard:trip_list' %}" class="inline-block px-4 py-2 bg-blue-500 text-white font-semibold rounded-lg shadow hover:bg-blue-600 transition">
                    Assigned Trips
                </a>
                
                
            </div>
        </div>
    </main>

    <script>
        document.getElementById("tripForm").addEventListener("submit", function (event) {
            event.preventDefault();

            const tripId = document.getElementById("trip_id").value;
            const surveyorName = document.getElementById("surveyor_name").value;
            const driverName = document.getElementById("driver_name").value;
            const location = document.getElementById("location").value;
            const date = document.getElementById("date").value;
            const vehicleNumber = document.getElementById("vehicle_number").value;
            const csrfToken = document.body.dataset.csrf;

            if (!tripId || !/^\d+$/.test(tripId)) {
                alert("Trip ID must be a number.");
                return;
            }
            if (!surveyorName || !/^[a-zA-Z\s]+$/.test(surveyorName)) {
                alert("Surveyor Name must contain only letters.");
                return;
            }
            if (!driverName || !/^[a-zA-Z\s]+$/.test(driverName)) {
                alert("Driver Name must contain only letters.");
                return;
            }
            if (!location) {
                alert("Please enter Location.");
                return;
            }
            if (!date) {
                alert("Please select Date.");
                return;
            }
            if (!vehicleNumber) {
                alert("Please enter Vehicle Number.");
                return;
            }

            const formData = new URLSearchParams({
                trip_id: tripId,
                surveyor_name: surveyorName,
                driver_name: driverName,
                location: location,
                date: date,
                vehicle_number: vehicleNumber
            });

            fetch("{% url 'survey_dashboard:submit_trip' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "X-CSRFToken": csrfToken
                },
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert("Trip added successfully!");
                        document.getElementById("tripForm").reset();
                    } else {
                        alert("Error: " + data.message);
                    }
                })
                .catch(error => alert("Error: " + error));
        });
    </script>
</body>
</html>
