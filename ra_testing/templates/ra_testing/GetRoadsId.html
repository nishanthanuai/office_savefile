<!DOCTYPE html>
<html>
<head>
    <title>Get Road IDs</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg,rgb(255, 255, 255) 0%,rgb(226, 226, 226) 30%, rgb(212, 212, 212) 63%, rgb(198, 198, 198) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        header {
            background-color: #437383;
            color: #fff;
            {% comment %} padding: 1.2rem 0; {% endcomment %}
            text-align: center;
            width: 100%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
        }

        main {
            width: 100%;
            padding-top: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 2rem;
            max-width: 90%;
            width: 1100px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            align-items: center;
            margin-bottom: 1rem;
        }

        .form-row div {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 300px;
        }

        .form-row label {
            margin-bottom: 0.4rem;
            font-weight: 500;
        }

        select {
            padding: 0.6rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            width: 100%;
        }

        .container button {
            background: linear-gradient(to right, #437383, #437383);
            color: #fff;
            padding: 0.75rem 2rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 1rem;
        }

        .container button:hover {
            transform: translateY(-2px);
        }

        .Roads {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 2rem;
            margin-top: 40px;
            max-width: 1100px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #437383;
            color: white;
            text-align: left;
        }

        tr:hover {
            background-color: #f1f1f1;
        }
        .roads-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .copy-btn {
            background: #437383;
            color: white;
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.3s ease;
        }

        .copy-btn:hover {
            background: #365e6e;
        }


        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <h2>Get Road IDs</h2>
    </header>

    <main>
        <div class="container">
            <form method="get">
                <div class="form-row">
                    <div>
                        <label>Head Office:</label>
                        <select name="ho" required>
                            <option value="">Select Head Office</option>
                            {% for ho in head_offices %}
                                <option value="{{ ho.id }}" {% if ho.id|stringformat:"s" == request.GET.ho %}selected{% endif %}>
                                    {{ ho.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label>Regional Office:</label>
                        <select name="ro" required>
                            <option value="">Select Regional Office</option>
                            {% for ro in regions %}
                                <option value="{{ ro.id }}" {% if ro.id|stringformat:"s" == request.GET.ro %}selected{% endif %}>
                                    {{ ro.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label>Sub Division:</label>
                        <select name="division" required>
                            <option value="">Select Sub-Division</option>
                            {% for div in divisions %}
                                <option value="{{ div.id }}" {% if div.id|stringformat:"s" == request.GET.division %}selected{% endif %}>
                                    {{ div.sub_division }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <button type="submit">Fetch Roads</button>
            </form>
        </div>
        
            {% if roads_data %}
            <div class="Roads">
                
            <div class="roads-header">
                <h3>Filtered Roads:</h3>
                <button type="button" class="copy-btn" onclick="copySelectedRoadIDs()">Copy Selected Road IDs</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th><input type="checkbox" id="select-all" onclick="toggleAll(this)"></th>
                        <th>Road ID</th>
                        <th>Road Name</th>
                    </tr>
                </thead>
                <tbody>
                    {% for road in roads_data %}
                    <tr>
                        <td><input type="checkbox" class="road-checkbox" value="{{ road.id }}"></td>
                        <td>{{ road.id }}</td>
                        <td>{{ road.name }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

            {% elif request.GET.ho and request.GET.ro and request.GET.division %}
            <div class="Roads">
                <p>No roads found for selected criteria.</p>
            </div>
            {% endif %}

    </main>
</body>
<script>
    function copySelectedRoadIDs() {
        const selected = Array.from(document.querySelectorAll('.road-checkbox:checked'))
                              .map(cb => cb.value);

        if (selected.length === 0) {
            alert("Please select at least one road.");
            return;
        }

        navigator.clipboard.writeText(selected.join(', '))
            .then(() => alert('Selected Road IDs copied to clipboard!'))
            .catch(err => alert('Failed to copy: ' + err));
    }

    function toggleAll(source) {
        const checkboxes = document.querySelectorAll('.road-checkbox');
        checkboxes.forEach(cb => cb.checked = source.checked);
    }
</script>

</html>
