 {% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit GPX Route</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg,rgb(255, 255, 255) 0%,rgb(226, 226, 226) 30%, rgb(212, 212, 212) 63%, rgb(198, 198, 198) 100%);
            color: #333;
        }

        .map-container {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            padding: 20px;
            margin: 20px auto;
            height: calc(100vh - 40px);
        }

        #map {
            width: 100%;
            height: calc(100% - 100px);
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .btn{
            border : 1px solid #437383;
        }

        .controls {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
            height: 60px;
            margin-top: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            transition: all 0.3s ease;
        }

        .btn {
            padding: 12px 24px;
            font-weight: 600;
            border-radius: 8px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn:hover {
            background-color: #437383;
            color: #fff;
            transform: translateY(-2px);
        }

        #batchInfo {
            background: #f1f3f5;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            min-width: 240px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .map-container {
                margin: 20px;
                height: calc(100vh - 30px);
            }

            .controls {
                height: auto;
                flex-direction: column;
            }

            #batchInfo {
                order: -1;
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            #map {
                height: calc(100% - 200px);
            }
        }
    </style>
</head>
<body>
    <div class="map-container">
        <select id="fileSelector" class="form-select" style="width: 200px; margin-bottom:10px;">
        </select>
        <button id="fixGpxButton" class="btn">Fix GPX File</button>
        <div id="map"></div>
        <div class="controls">
            <input type="checkbox" id="enableMultiSelect" class="form-check-input">
            <label for="enableMultiSelect" class="form-check-label">Enable Multiple Points Selection</label>
            <button id="prevBatch" class="btn" disabled>Previous 500</button>
            <div id="batchInfo"></div>
            <button id="nextBatch" class="btn">Next 500</button>
            <button id="undoButton" class="btn" disabled>Undo (Ctrl+Z)</button>
            <button id="downloadSelectedButton" class="btn">Download Selected File</button>
            
        </div>
    </div>

    <script>
        let currentFileIndex = 0; 
        const filesData = {{ files_data|safe }};
        {% comment %} console.log("data",pointsData) {% endcomment %}
        {% comment %} [{},{}] {% endcomment %}

        let pointsData=[];
        const fileSelector=document.getElementById('fileSelector');
        filesData.forEach((fileObj,index)=>{
            const option=document.createElement('option');
            option.value=index;
            option.textContent=fileObj.file_name;
            fileSelector.appendChild(option);
        })

        fileSelector.addEventListener('change',function(){
            currentFileIndex=parseInt(this.value);
            pointsData=filesData[currentFileIndex].points;
            allPoints=[...pointsData]
            loadBatch(0);
        })
        if (filesData.length > 0){
            pointsData = filesData[0].points;
        }
        const updateGpxUrl = "{% url 'gpx_processor:update_gpx' %}";
        {% comment %} const url="{% url 'gpx_processor:fix_gpx'%}" {% endcomment %}

        document.getElementById('fixGpxButton').addEventListener('click',function(){
            const selectedIndex=parseInt(fileSelector.value);
            const selectedFileName = filesData[selectedIndex].file_name;
            
            fetch(`/process/fix_gpx/${selectedFileName}/`,{
                method:'POST',
                headers:{
                    'Content-Type':'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                }
            })
            .then(response => {
                if (!response.ok) throw new Error(response.statusText);
                return response.blob();
            })
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `fixed_${selectedFileName}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            })
            .catch(error => {
                console.error('Error fixing GPX file:', error);
            });
        })
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCzmow8f_ZC9tyhaULB5xec8sG4HEchADk&libraries=geometry"></script>
    <script src="{% static 'ra_testing/js/map_edit.js' %}"></script>
</body>
</html>
